<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to City Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        
        <div class="container">
        <div class="title-box">
            <h1 class="animated-title">📚 City Library</h1>
        </div>

        <div class="stats-panel">
            <div>Total: <span id="stat-total">0</span></div>
            <div>Available: <span id="stat-available">0</span></div>
            <div>Borrowed: <span id="stat-borrowed">0</span></div>
        </div>

        <div class="form-section">
            <h3>Add a New Book</h3>
            <div class="input-group">
                <input type="text" id="book-title" placeholder="Book Title..." autocomplete="off">
                <input type="text" id="book-author" placeholder="Author Name..." autocomplete="off">
                <button id="add-btn">Add Book</button>
            </div>
        </div>

        <div class="library-section">
            <h3>Library Catalogue</h3>
            
            <div class="search-section">
                <input type="text" id="search-input" placeholder="🔍 Search by title or author..." autocomplete="off">
            </div>

            <ul id="books-list" class="books-list">
                </ul>
        </div>

        <div id="delete-modal" class="modal-overlay">
        <div class="modal-box">
            <h3>Confirm Deletion</h3>
            <p>Are you sure you want to delete this book?</p>
            <div class="modal-actions">
                <button id="confirm-delete-btn" class="btn-danger-modal">Yes, Delete</button>
                <button onclick="closeModal('delete-modal')" class="btn-cancel-modal">No, Keep It</button>
            </div>
        </div>
    </div>

    <div id="borrow-modal" class="modal-overlay">
        <div class="modal-box">
            <h3>Select Borrow Duration</h3>
            <p>For how many days would you like to borrow this book?</p>
            <div class="modal-actions-column">
                <button onclick="confirmBorrowDuration(7)" class="btn-duration">🗓️ 1 Week (7 Days)</button>
                <button onclick="confirmBorrowDuration(14)" class="btn-duration">🗓️ 2 Weeks (14 Days)</button>
                <button onclick="closeModal('borrow-modal')" class="btn-cancel-modal">Cancel</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
